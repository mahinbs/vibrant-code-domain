
<style>
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;gap:0;min-height:420px}

/* progress (kept for animation state only; hidden visually) */
.prog{display:none}
.dot{width:18px;height:3px;border-radius:2px;background:var(--color-border-tertiary);transition:background .35s,width .35s}
.dot.on{background:#7F77DD;width:26px}
.plbl{font-size:11px;color:var(--color-text-secondary);min-width:115px;text-align:left}

/* scene */
.scene{width:380px;height:400px;display:flex;align-items:center;justify-content:center;perspective:1500px;position:relative}

/* phone iso wrapper */
.ph{
  width:150px;height:270px;
  position:relative;
  transform-style:preserve-3d;
  transform:rotateX(38deg) rotateZ(16deg) scale(1.6);
  animation:bob 5s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:rotateX(38deg) rotateZ(16deg) scale(1.6) translateY(0)}
  50%{transform:rotateX(38deg) rotateZ(16deg) scale(1.6) translateY(-10px)}
}

/* front face */
.pf{
  position:absolute;inset:0;
  border-radius:22px;
  overflow:hidden;
  transform:translateZ(0px);
  border:1.5px dashed rgba(127,119,221,.7);
  background:transparent;
  transition:background .7s ease,border-color .6s ease;
}
.pf.s{background:#0f0f1e;border-color:transparent;border-style:solid}

/* right face */
.pr{
  position:absolute;
  top:10px;left:149px;
  width:14px;height:250px;
  transform-origin:0% 50%;
  transform:rotateY(-90deg);
  border-radius:0 3px 3px 0;
  border:1px dashed rgba(127,119,221,.35);
  background:transparent;
  transition:background .7s,border .6s;
}
.pr.s{background:#09091a;border:none}

/* top face */
.pt{
  position:absolute;
  top:0;left:10px;
  width:130px;height:14px;
  transform-origin:50% 0%;
  transform:rotateX(-90deg);
  border-radius:3px 3px 0 0;
  border:1px dashed rgba(127,119,221,.3);
  background:transparent;
  transition:background .7s,border .6s;
}
.pt.s{background:#0c0c18;border:none}

/* notch */
.ntch{width:48px;height:6px;border-radius:0 0 5px 5px;margin:9px auto 0;background:transparent;transition:background .5s;position:relative;z-index:5}
.pf.s .ntch{background:#060610}

/* screen area — clips rising layers */
.scrn{position:absolute;top:22px;left:7px;right:7px;bottom:10px;overflow:hidden;border-radius:0 0 14px 14px}

/* UI layers — rise from below */
.ul{
  position:absolute;left:0;right:0;
  opacity:0;
  transform:translateY(310px);
  border:1px dashed rgba(127,119,221,.6);
  border-radius:6px;
  background:transparent;
  transition:
    transform .65s cubic-bezier(.22,1.4,.6,1),
    opacity .4s,
    background .55s .1s,
    border .45s;
}
.ul.up{transform:translateY(0);opacity:1}
.ul.fill{border-color:transparent!important}

/* layer geometry */
.u0{top:0;bottom:0;left:0;right:0;border-radius:0;border:none}
.u0.fill{background:#18182e}
.u1{top:3px;height:27px}
.u2{top:38px;height:61px;border-radius:8px}
.u2.fill{background:#EEEDFE;border-radius:8px}
.u3{top:107px;height:27px}
.u4{top:142px;bottom:3px}

/* inner content fades after fill */
.ic{opacity:0;transition:opacity .45s .2s}
.fill .ic{opacity:1}

/* header */
.hc{display:flex;align-items:center;height:100%;padding:0 5px;gap:5px}
.hav{width:16px;height:16px;border-radius:50%;background:#AFA9EC;flex-shrink:0}
.hln{flex:1;display:flex;flex-direction:column;gap:2px}
.hl1{height:4px;background:rgba(255,255,255,.25);border-radius:2px;width:42%}
.hl2{height:3px;background:rgba(255,255,255,.12);border-radius:2px;width:28%}
.hbel{font-size:9px;color:rgba(255,255,255,.3)}

/* balance card */
.bc{padding:6px 8px;display:flex;flex-direction:column;gap:3px}
.blbl{font-size:7px;color:#534AB7;font-weight:500;margin:0}
.bamt{font-size:14px;color:#3C3489;font-weight:500;margin:0}
.btrend{display:flex;align-items:center;gap:2px;font-size:7px;color:#534AB7}

/* mini stats */
.mc2{display:flex;gap:3px;height:100%}
.mcard{flex:1;background:rgba(255,255,255,.05);border-radius:5px;padding:3px 4px;display:flex;flex-direction:column;justify-content:space-evenly}
.mln1{height:4px;border-radius:2px;background:rgba(255,255,255,.15);width:55%}
.mln2{height:5px;border-radius:2px;background:rgba(127,119,221,.4);width:40%}

/* txn list */
.tc{display:flex;flex-direction:column;gap:5px;padding:3px 0}
.tr{display:flex;align-items:center;gap:4px}
.tdot{width:13px;height:13px;border-radius:50%;background:rgba(127,119,221,.25);flex-shrink:0}
.ti{flex:1;display:flex;flex-direction:column;gap:2px}
.tla{height:4px;background:rgba(255,255,255,.2);border-radius:2px;width:52%}
.tlb{height:3px;background:rgba(255,255,255,.1);border-radius:2px;width:32%}
.tam{font-size:7px;color:rgba(127,119,221,.85);font-weight:500}

/* wireframe grid on screen during wf phase */
.wfgrid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(127,119,221,.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(127,119,221,.08) 1px,transparent 1px);
  background-size:14px 14px;
  opacity:1;
  transition:opacity .6s;
}
.pf.s .wfgrid{opacity:0}

/* subtle halo when complete */
.halo{
  position:absolute;inset:-20px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(127,119,221,.08) 0%,transparent 70%);
  opacity:0;
  transition:opacity .8s;
  pointer-events:none;
}
.halo.on{opacity:1}
</style>

<div class="wrap">
  <div class="prog" aria-hidden="true">
    <div class="dot on" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
    <div class="dot" id="d5"></div>
    <span class="plbl" id="plbl">Wireframe skeleton</span>
  </div>
  <div class="scene">
    <div class="halo" id="halo"></div>
    <div class="ph" id="phone">
      <div class="pf" id="pf">
        <div class="wfgrid" id="wfg"></div>
        <div class="ntch"></div>
        <div class="scrn">
          <div class="ul u0" id="l0"></div>
          <div class="ul u1" id="l1">
            <div class="ic hc">
              <div class="hav"></div>
              <div class="hln"><div class="hl1"></div><div class="hl2"></div></div>
              <i class="ti ti-bell hbel" aria-hidden="true"></i>
            </div>
          </div>
          <div class="ul u2" id="l2">
            <div class="ic bc">
              <p class="blbl">Hours saved</p>
              <p class="bamt">1,240 hrs</p>
              <div class="btrend"><i class="ti ti-trending-up" style="font-size:8px" aria-hidden="true"></i><span>+12.4% this month</span></div>
            </div>
          </div>
          <div class="ul u3" id="l3">
            <div class="ic mc2">
              <div class="mcard"><div class="mln1"></div><div class="mln2"></div></div>
              <div class="mcard"><div class="mln1"></div><div class="mln2"></div></div>
              <div class="mcard"><div class="mln1"></div><div class="mln2"></div></div>
            </div>
          </div>
          <div class="ul u4" id="l4">
            <div class="ic tc">
              <div class="tr"><div class="tdot"></div><div class="ti"><div class="tla"></div><div class="tlb"></div></div><span class="tam">-$42</span></div>
              <div class="tr"><div class="tdot"></div><div class="ti"><div class="tla" style="width:44%"></div><div class="tlb" style="width:28%"></div></div><span class="tam">+$320</span></div>
              <div class="tr"><div class="tdot"></div><div class="ti"><div class="tla" style="width:48%"></div><div class="tlb" style="width:33%"></div></div><span class="tam">-$156</span></div>
            </div>
          </div>
        </div>
      </div>
      <div class="pr" id="pr"></div>
      <div class="pt" id="pt"></div>
    </div>
  </div>
</div>

<script>
const LABELS = [
  'Wireframe skeleton',
  'Phone body',
  'Screen background',
  'Header bar',
  'Balance card',
  'Final product'
];

function setStage(n) {
  for (let i = 0; i < 6; i++) {
    document.getElementById('d' + i).classList.toggle('on', i <= n);
  }
  document.getElementById('plbl').textContent = LABELS[n];
}

function cls(id, ...c) { document.getElementById(id).classList.add(...c); }
function rmv(id, ...c) { document.getElementById(id).classList.remove(...c); }

function reset() {
  ['pf','pr','pt'].forEach(id => rmv(id,'s'));
  [0,1,2,3,4].forEach(i => rmv('l'+i,'up','fill'));
  rmv('halo','on');
  setStage(0);
}

function run() {
  reset();
  const seq = [
    [800,  () => { cls('pf','s'); cls('pr','s'); cls('pt','s'); setStage(1); }],
    [700,  () => { cls('l0','up'); setStage(2); }],
    [600,  () => { cls('l0','fill'); cls('l1','up'); setStage(3); }],
    [620,  () => { cls('l1','fill'); cls('l2','up'); setStage(4); }],
    [630,  () => { cls('l2','fill'); cls('l3','up'); }],
    [600,  () => { cls('l3','fill'); cls('l4','up'); }],
    [620,  () => { cls('l4','fill'); setStage(5); cls('halo','on'); }],
  ];

  let t = 400;
  seq.forEach(([delay, fn]) => { t += delay; setTimeout(fn, t); });
  setTimeout(run, t + 3000);
}

run();
</script>
